<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
	<f:layout name="Default" />
	<f:section name="Main">
		<f:switch expression="{data.layout}">
			<f:case value="2">
				<div class="container">
					{record -> f:render.text(field: 'bodytext')}
				</div>
			</f:case>
			<f:defaultCase>
				<section>
					<div class="container">
						<div class="row">
							<div class="col-lg-8 mx-auto text-center highed">
								{record -> f:render.text(field: 'bodytext')}
							</div>
						</div>
					</div>
				</section>
			</f:defaultCase>
		</f:switch>
	</f:section>
</html>
